name: EmbraceDemo
options:
  bundleIdPrefix: io.pula.embracedemo
  deploymentTarget:
    iOS: "13.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    # Leave ARCHS/EXCLUDED_ARCHS at Xcode defaults so the arm64 simulator slice works.

targets:
  EmbraceDemo:
    type: application
    platform: iOS
    deploymentTarget: "13.0"
    sources:
      - path: EmbraceDemo
    info:
      path: EmbraceDemo/Info.plist
      properties:
        CFBundleDisplayName: Embrace Demo iOS
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).SceneDelegate
        # Demo only: allow cleartext OTLP/HTTP to http://localhost:4318. NOT for production.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSExceptionDomains:
            localhost:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.pula.embracedemo.ios
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"
        # Simulator builds need no signing; avoids team/identity prompts in a headless build.
        CODE_SIGNING_ALLOWED: NO
